<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
    <script src="../shared/constants.js"></script>
    <script src="../shared/utils/logger.js"></script>
    <script src="../shared/utils/text.js"></script>
    <script src="../shared/utils/storage.js"></script>
    <script src="../shared/utils/license-api.js"></script>
    <script src="../shared/utils/license-state.js"></script>
    <script src="../shared/utils/payment-gate.js"></script>
    <script src="../shared/utils/city-tags.js"></script>
    <script src="../shared/utils/intervals.js"></script>
    <script src="../shared/utils/runtime-controls.js"></script>
    <script src="../shared/utils/state-store.js"></script>
    <script src="../shared/utils/messaging.js"></script>
    <script src="tag-manager.js"></script>
</head>
<body>
    <section class="popup-container">
        <header>
            <div class="brand-lockup">
                <img src="../assets/images/uk-flag.png" alt="Amazon Warehouse UK" class="logo">
                <h1>Amazon Warehouse UK <span id="version"></span></h1>
            </div>
            <div class="header-controls">
                <div class="toggle-section" data-authenticated-section>
                    <label for="log_mode">Logs</label>
                    <select id="log_mode" class="log-mode-select" title="Console log mode">
                        <option value="standard">Standard</option>
                        <option value="debug">Debug</option>
                        <option value="off">Off</option>
                    </select>
                </div>
                <div class="toggle-section">
                    <label for="activate">Activate</label>
                    <label class="switch">
                        <input type="checkbox" id="activate" disabled>
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </header>
        <div class="dashboard">
            <div class="dropdowns-container" data-authenticated-section>
                <label class="field field-full" for="city">
                    <span>City</span>
                    <select id="city" name="city"></select>
                </label>
                <label class="field" for="distance">
                    <span>Distance (km)</span>
                    <select id="distance" name="distance"></select>
                </label>
                <div class="field field-job-types">
                    <div class="field-header">
                        <label for="jobType">Job Type</label>
                        <button type="button" id="select-all-job-types">All job types</button>
                    </div>
                    <select id="jobType" name="jobType" multiple size="4"></select>
                </div>
                <div class="field field-full">
                    <label for="fetch_interval_value">Fetch Interval</label>
                    <div class="fetch-interval-container">
                        <input type="number" id="fetch_interval_value" title="Fetch Interval Value" name="fetch_interval_value" min="1" class="fetch-interval-input">
                        <select id="fetch_interval_unit" title="Fetch Interval Unit" name="fetch_interval_unit" class="fetch-interval-unit">
                            <option value="ms" selected>Milliseconds</option>
                            <option value="s">Seconds</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="tag-input-container" data-authenticated-section>
                <div class="tag-input-header">
                    <label for="city-input">City Filters</label>
                    <div class="tag-input-actions">
                        <span id="city-scope-status" class="city-scope-status">City specific</span>
                        <button type="button" id="add-all-cities">All cities</button>
                        <span id="clear-all">Clear all</span>
                    </div>
                </div>
                <div id="tag-input-box">
                    <input type="text" id="city-input" placeholder="Type a city and press enter">
                </div>
            </div>
            <div class="popup-footer" data-authenticated-section>
                <p class="autosave-text">Changes are autosaved.</p>
                <form class="button-form" name="refresh_info" id="refresh_info">
                    <button id="refresh_btn" type="submit" class="button configure">Refresh</button>
                </form>
                <form class="button-form" name="ais_visa_info" id="ais_visa_info">
                    <button id="reset_info" type="submit" class="button configure">Reset</button>
                </form>
            </div>
            <section class="credit-actions" aria-label="Booking access plans">
                <div class="pricing-header">
                    <span>Booking Access</span>
                    <small id="license-status" class="license-status" role="status"></small>
                </div>
                <div class="pricing-grid">
                    <article class="pricing-card">
                        <div>
                            <strong>30-Day Pass</strong>
                            <p>Unlimited bookings for one month.</p>
                        </div>
                        <div class="pricing-row">
                            <span class="price">$50</span>
                            <button id="checkout_btn" data-plan="credits" type="button" class="button buy checkout-button">Get 30 days</button>
                        </div>
                    </article>
                    <article class="pricing-card pricing-card-featured">
                        <span class="plan-badge">Best value</span>
                        <div>
                            <strong>Pro Annual</strong>
                            <p>Unlimited bookings for a full year of Amazon hiring cycles.</p>
                        </div>
                        <div class="pricing-row">
                            <span class="price">$120</span>
                            <button id="checkout_pro_btn" data-plan="pro" type="button" class="button buy checkout-button">Go Pro</button>
                        </div>
                    </article>
                </div>
            </section>
        </div>
    </section>
    <script src="content.js"></script>
</body>
</html>
